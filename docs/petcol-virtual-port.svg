<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 460" font-family="'DejaVu Sans','Segoe UI',Arial,sans-serif">
  <rect width="1120" height="460" rx="18" fill="#0f172a"/>
  <rect x="0.5" y="0.5" width="1119" height="459" rx="18" fill="none" stroke="#1e293b"/>

  <text x="40" y="52" fill="#a3e635" font-size="26" font-weight="700">a transparent virtual serial port</text>
  <text x="40" y="78" fill="#94a3b8" font-size="15">use the Arduino exactly as normal while petcol packets are filtered out on the side</text>

  <!-- arduino -->
  <rect x="34" y="150" width="176" height="156" rx="12" fill="#111c33" stroke="#243049"/>
  <text x="122" y="186" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Arduino</text>
  <text x="122" y="220" text-anchor="middle" fill="#84cc16" font-size="12">type-1/2 packets</text>
  <text x="122" y="244" text-anchor="middle" fill="#94a3b8" font-size="12">+ Serial.print()</text>
  <text x="122" y="288" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="'DejaVu Sans Mono',monospace">/dev/ttyUSB0</text>

  <!-- arduino <-> bridge -->
  <text x="265" y="212" text-anchor="middle" fill="#64748b" font-size="10.5">real USB serial</text>
  <line x1="222" y1="228" x2="308" y2="228" stroke="#475569" stroke-width="2.5"/>
  <polygon points="320,228 304,221 304,235" fill="#475569"/>
  <polygon points="210,228 226,221 226,235" fill="#475569"/>

  <!-- bridge -->
  <rect x="320" y="120" width="320" height="248" rx="12" fill="#111c33" stroke="#243049"/>
  <text x="480" y="150" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">limesplay bridge</text>
  <line x1="344" y1="162" x2="616" y2="162" stroke="#243049"/>
  <text x="480" y="184" text-anchor="middle" fill="#94a3b8" font-size="11.5" font-family="'DejaVu Sans Mono',monospace">owns /dev/ttyUSB0</text>

  <rect x="344" y="198" width="272" height="60" rx="8" fill="#1a2e05" stroke="#84cc16"/>
  <text x="480" y="223" text-anchor="middle" fill="#bef264" font-size="13.5" font-weight="700">petcol decoder</text>
  <text x="480" y="243" text-anchor="middle" fill="#84cc16" font-size="11.5">verify CRC-32 · split the stream</text>

  <rect x="344" y="270" width="272" height="60" rx="8" fill="#083344" stroke="#22d3ee"/>
  <text x="480" y="295" text-anchor="middle" fill="#a5f3fc" font-size="13.5" font-weight="700" font-family="'DejaVu Sans Mono',monospace">pty → /tmp/ttyLIME</text>
  <text x="480" y="315" text-anchor="middle" fill="#22d3ee" font-size="11.5">a virtual port the monitor opens</text>

  <text x="480" y="352" text-anchor="middle" fill="#64748b" font-size="11">mirrors DTR/RTS · reset-on-open preserved</text>

  <!-- output to app -->
  <path d="M640 228 C 716 228, 700 186, 792 186" fill="none" stroke="#84cc16" stroke-width="2.5"/>
  <polygon points="808,186 792,179 792,193" fill="#84cc16"/>
  <rect x="808" y="156" width="290" height="64" rx="10" fill="#111c33" stroke="#84cc16"/>
  <text x="828" y="184" fill="#bef264" font-size="15" font-weight="700">your app</text>
  <text x="828" y="204" fill="#84cc16" font-size="11.5">decoded, CRC-checked packets</text>

  <!-- output to monitor (bidirectional) -->
  <path d="M640 300 C 716 300, 700 312, 792 312" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <polygon points="808,312 792,305 792,319" fill="#22d3ee"/>
  <polygon points="640,300 656,293 656,307" fill="#22d3ee"/>
  <rect x="808" y="278" width="290" height="78" rx="10" fill="#111c33" stroke="#22d3ee"/>
  <text x="828" y="304" fill="#a5f3fc" font-size="15" font-weight="700">Arduino Serial Monitor</text>
  <text x="828" y="324" fill="#22d3ee" font-size="11.5">opens /tmp/ttyLIME — sees only debug</text>
  <text x="828" y="342" fill="#64748b" font-size="11.5">type back to the board as usual</text>

  <text x="560" y="424" text-anchor="middle" fill="#cbd5e1" font-size="14.5">Uploads bypass the bridge (avrdude needs the real port); monitoring — including reset-on-open — works exactly as normal.</text>
</svg>
