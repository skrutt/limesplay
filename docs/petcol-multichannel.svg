<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="'DejaVu Sans','Segoe UI',Arial,sans-serif">
  <rect width="1000" height="380" rx="18" fill="#0f172a"/>
  <rect x="0.5" y="0.5" width="999" height="379" rx="18" fill="none" stroke="#1e293b"/>

  <text x="40" y="52" fill="#a3e635" font-size="26" font-weight="700">independent channels over one link</text>
  <text x="40" y="78" fill="#94a3b8" font-size="15">give each petcol instance its own delimiter and they share a single serial line without colliding</text>

  <!-- instances -->
  <rect x="34" y="116" width="226" height="64" rx="10" fill="#1a2e05" stroke="#84cc16"/>
  <text x="147" y="143" text-anchor="middle" fill="#bef264" font-size="14" font-weight="700" font-family="'DejaVu Sans Mono',monospace">petcol stats(send)</text>
  <text x="147" y="164" text-anchor="middle" fill="#84cc16" font-size="12">delimiter 0xAA</text>

  <rect x="34" y="200" width="226" height="64" rx="10" fill="#083344" stroke="#22d3ee"/>
  <text x="147" y="227" text-anchor="middle" fill="#a5f3fc" font-size="14" font-weight="700" font-family="'DejaVu Sans Mono',monospace">petcol debug(send,0)</text>
  <text x="147" y="248" text-anchor="middle" fill="#22d3ee" font-size="12">delimiter 0x00</text>

  <!-- merge -->
  <path d="M260 148 C 300 148, 300 188, 344 188" fill="none" stroke="#84cc16" stroke-width="2.5"/>
  <path d="M260 232 C 300 232, 300 196, 344 196" fill="none" stroke="#22d3ee" stroke-width="2.5"/>

  <!-- shared wire -->
  <text x="500" y="172" text-anchor="middle" fill="#64748b" font-size="12">one serial link</text>
  <rect x="344" y="178" width="312" height="44" rx="10" fill="#0b1426" stroke="#243049"/>
  <rect x="354" y="187" width="58" height="26" rx="5" fill="#84cc16"/><text x="383" y="205" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="700" font-family="'DejaVu Sans Mono',monospace">..AA</text>
  <rect x="418" y="187" width="58" height="26" rx="5" fill="#22d3ee"/><text x="447" y="205" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="700" font-family="'DejaVu Sans Mono',monospace">..00</text>
  <rect x="482" y="187" width="58" height="26" rx="5" fill="#84cc16"/><text x="511" y="205" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="700" font-family="'DejaVu Sans Mono',monospace">..AA</text>
  <rect x="546" y="187" width="58" height="26" rx="5" fill="#84cc16"/><text x="575" y="205" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="700" font-family="'DejaVu Sans Mono',monospace">..AA</text>
  <rect x="610" y="187" width="38" height="26" rx="5" fill="#22d3ee"/><text x="629" y="205" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="700" font-family="'DejaVu Sans Mono',monospace">00</text>

  <!-- arrow to demux -->
  <line x1="656" y1="200" x2="708" y2="200" stroke="#475569" stroke-width="2.5"/>
  <polygon points="724,200 708,193 708,207" fill="#475569"/>

  <!-- demux -->
  <rect x="724" y="168" width="96" height="64" rx="10" fill="#111c33" stroke="#243049"/>
  <text x="772" y="195" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">route by</text>
  <text x="772" y="214" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">delimiter</text>

  <!-- outputs -->
  <path d="M820 188 C 856 188, 856 150, 892 150" fill="none" stroke="#84cc16" stroke-width="2.5"/>
  <polygon points="908,150 892,143 892,157" fill="#84cc16"/>
  <path d="M820 212 C 856 212, 856 250, 892 250" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <polygon points="908,250 892,243 892,257" fill="#22d3ee"/>
  <text x="916" y="146" fill="#bef264" font-size="14" font-weight="700">stats</text>
  <text x="916" y="164" fill="#84cc16" font-size="11.5">channel</text>
  <text x="916" y="246" fill="#a5f3fc" font-size="14" font-weight="700">debug</text>
  <text x="916" y="264" fill="#22d3ee" font-size="11.5">channel</text>

  <text x="500" y="332" text-anchor="middle" fill="#cbd5e1" font-size="15">Need another stream? Add another instance. A stray delimiter inside data can't fool a channel — the CRC has to match too.</text>
</svg>
